<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA:SAMP AI Character Story Generator</title>
    <!-- GSAP untuk Animasi Smooth -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: rgba(22, 33, 62, 0.7);
            --accent-color: #00fff0;
            --accent-purple: #8a2be2;
            --text-color: #e2e8f0;
            --input-bg: #121225;
            --border-color: #1f4068;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1a1a3a 0%, var(--bg-color) 100%);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 750px;
            background: var(--container-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(0, 255, 240, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            opacity: 0;
            transform: translateY(30px);
        }

        h2 {
            text-align: center;
            color: var(--accent-color);
            margin-top: 0;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 255, 240, 0.5);
        }

        p.subtitle {
            text-align: center;
            color: #8c92ac;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--accent-color);
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        input[type="text"], input[type="date"] {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--input-bg);
            color: #fff;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, input[type="date"]:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 12px rgba(0, 255, 240, 0.3);
            background-color: #161630;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-generate { 
            background: linear-gradient(45deg, var(--accent-color), var(--accent-purple)); 
            color: #fff; 
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            box-shadow: 0 4px 15px rgba(0, 255, 240, 0.2);
        }
        
        .btn-generate:hover:not(:disabled) {
            filter: brightness(1.1);
            box-shadow: 0 6px 20px rgba(0, 255, 240, 0.4);
            transform: translateY(-2px);
        }

        .btn-generate:active:not(:disabled) {
            transform: translateY(1px);
        }

        button:disabled { 
            background: #333 !important; 
            cursor: not-allowed; 
            color: #aaa;
            box-shadow: none;
        }

        /* Loading Animation */
        .loading-wrapper {
            display: none;
            text-align: center;
            margin: 25px 0;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(0, 255, 240, 0.1);
            border-top: 5px solid var(--accent-color);
            border-radius: 50%;
            margin: 0 auto 15px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #ffbc00;
            font-weight: 500;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        /* Output Section */
        .output-container {
            margin-top: 35px;
            display: none;
            opacity: 0;
            transform: translateY(20px);
        }

        #output {
            background: #090d16;
            border-left: 4px solid var(--accent-color);
            padding: 25px;
            white-space: pre-wrap;
            border-radius: 8px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 16px;
            line-height: 1.7;
            color: #f1f5f9;
            text-align: justify;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
            max-height: 400px;
            overflow-y: auto;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-copy { background-color: #2ecc71; color: #fff; }
        .btn-download { background-color: #3498db; color: #fff; }
        .btn-copy:hover { box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3); transform: translateY(-2px); }
        .btn-download:hover { box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3); transform: translateY(-2px); }

        .pastebin-link {
            display: none;
            opacity: 0;
            margin-top: 20px;
            text-align: center;
            background: rgba(0,0,0,0.4);
            padding: 12px;
            border-radius: 8px;
            border: 1px dashed rgba(255,255,255,0.1);
        }

        .pastebin-link a {
            color: var(--accent-color);
            font-weight: bold;
            text-decoration: none;
            transition: 0.2s;
        }

        .pastebin-link a:hover { text-decoration: underline; text-shadow: 0 0 8px var(--accent-color); }

        /* Responsivitas Layar Ponsel */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 20px; border-radius: 12px; }
            .btn-group { flex-direction: column; gap: 8px; }
            #output { padding: 15px; font-size: 15px; }
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <h2>Character Story AI</h2>
    <p class="subtitle">SAMP Auto-Generator dengan animasi halus & responsif</p>

    <div class="form-group">
        <label for="charName">Nama Karakter (Gunakan Underscore '_')</label>
        <input type="text" id="charName" placeholder="Contoh: Carl_Johnson" required>
    </div>
    
    <div class="form-group">
        <label for="birthPlace">Tempat Lahir</label>
        <input type="text" id="birthPlace" placeholder="Contoh: Brooklyn, USA" required>
    </div>
    
    <div class="form-group">
        <label for="birthDate">Tanggal Lahir</label>
        <input type="date" id="birthDate" required>
    </div>

    <div class="form-group">
        <label for="promptTambahan">Detail Cerita Tambahan (Opsional)</label>
        <input type="text" id="promptTambahan" placeholder="Contoh: Suka balapan, merantau karena miskin, mantan napi">
    </div>
    
    <button class="btn-generate" id="btnGen" onclick="generateStoryWithAnim()">
        <span>Buat Cerita Sekarang ✨</span>
    </button>
    
    <div class="loading-wrapper" id="loadingArea">
        <div class="spinner"></div>
        <div class="loading-text">AI sedang merangkai cerita unik untukmu...</div>
    </div>

    <div class="output-container" id="outputContainer">
        <label style="font-size: 16px; margin-bottom: 10px;">Hasil Format Forum:</label>
        <div id="output"></div>
        
        <div class="btn-group">
            <button class="btn-copy" onclick="copyText()">📋 Salin Teks</button>
            <button class="btn-download" onclick="downloadTxt()">💾 Unduh .TXT</button>
        </div>

        <div class="pastebin-link" id="pastebinLink">
            Teks berhasil disalin! Kirim ke <a href="https://pastebin.com" target="_blank">Pastebin Resmi</a> (Tekan CTRL + V)
        </div>
    </div>
</div>

<script>
    // Animasi Loading Awal saat Web Dibuka
    window.addEventListener('DOMContentLoaded', () => {
        gsap.to("#mainContainer", { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" });
    });

    async function generateStoryWithAnim() {
        const fullName = document.getElementById('charName').value.trim();
        const place = document.getElementById('birthPlace').value.trim();
        const dateInput = document.getElementById('birthDate').value;
        const infoTambahan = document.getElementById('promptTambahan').value.trim();

        if(!fullName || !place || !dateInput) {
            alert("Mohon isi semua data formulir terlebih dahulu!");
            return;
        }

        const dateObj = new Date(dateInput);
        const day = String(dateObj.getDate()).padStart(2, '0');
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const year = dateObj.getFullYear();
        const formatCSDate = `${day}/${month}/${year}`;

        const btn = document.getElementById('btnGen');
        const loadingArea = document.getElementById('loadingArea');
        const outputContainer = document.getElementById('outputContainer');
        const pastebinLink = document.getElementById('pastebinLink');

        // Reset state & Animasi Sembunyikan output lama jika ada
        pastebinLink.style.display = 'none';
        btn.disabled = true;
        
        if(outputContainer.style.display === 'block') {
            gsap.to(outputContainer, { opacity: 0, y: 15, duration: 0.3, onComplete: () => {
                outputContainer.style.display = 'none';
                startLoading();
            }});
        } else {
            startLoading();
        }

        function startLoading() {
            loadingArea.style.display = 'block';
            gsap.fromTo(loadingArea, { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.7)" });
        }

        // Prompt AI
        const promptAI = `Buatkan cerita latar belakang karakter (Character Story) untuk game GTA SAMP. Gunakan Bahasa Indonesia yang baku, rapi, dan mengalir formal (gaya tulisan novel/cerita). Cerita WAJIB minimal terdiri dari 3 paragraf panjang (total minimal 300 kata). Tulis HANYA bagian ceritanya saja tanpa teks pembuka/penutup. Berikan 5 spasi di awal setiap paragraf agar menjorok ke dalam (indentasi). Data Karakter - Nama: ${fullName.replace('_', ' ')}, Tempat Lahir: ${place}, Tanggal Lahir: ${day}/${month}/${year}. Detail tambahan alur: ${infoTambahan ? infoTambahan : 'Ceritakan masa kecilnya, alasan dia merantau ke Los Santos, dan pekerjaannya saat ini untuk bertahan hidup di Los Santos.'}`;

        try {
            const response = await fetch("https://text.pollinations.ai/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: [{ role: "user", content: promptAI }],
                    model: "openai"
                })
            });

            if (!response.ok) throw new Error("Server AI sedang sibuk.");
            
            const aiStory = await response.text();
            const finalOutput = `Character: ${fullName}\nOrigin: ${place}\nStory Character Born: ${formatCSDate}\n\n--- Character Story ---\n\n${aiStory}`;

            // Tampilkan Hasil dengan Animasi Smooth Fade In
            document.getElementById('output').innerText = finalOutput;
            
            gsap.to(loadingArea, { opacity: 0, duration: 0.3, onComplete: () => {
                loadingArea.style.display = 'none';
                
                outputContainer.style.display = 'block';
                gsap.fromTo(outputContainer, { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" });
                
                // Auto Scroll smooth ke area output
                outputContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }});

        } catch (error) {
            alert("Koneksi bermasalah: " + error.message + "\nSilakan klik tombol ulang.");
            loadingArea.style.display = 'none';
        } finally {
            btn.disabled = false;
        }
    }

    function copyText() {
        const textToCopy = document.getElementById('output').innerText;
        const pastebinLink = document.getElementById('pastebinLink');
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            pastebinLink.style.display = 'block';
            gsap.fromTo(pastebinLink, { opacity: 0, scale: 0.95 }, { opacity: 1, scale: 1, duration: 0.4, ease: "power2.out" });
            alert("Teks cerita berhasil disalin!");
        }).catch(err => {
            alert("Gagal menyalin teks.");
        });
    }

    function downloadTxt() {
        const textToCopy = document.getElementById('output').innerText;
        const name = document.getElementById('charName').value.trim() || "character_story";
        const blob = new Blob([textToCopy], { type: "text/plain;charset=utf-8" });
        const link = document.createElement("a");
        
        link.href = URL.createObjectURL(blob);
        link.download = `${name}_CS.txt`;
        link.click();
        URL.revokeObjectURL(link.href);
    }
</script>

</body>
</html>
