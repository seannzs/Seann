<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMP AI Character Story Generator</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- GSAP Smooth Animation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg-dark: #070b19;
            --container-bg: #0f162e;
            --sea-blue: #00fff0;
            --neon-purple: #8a2be2;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --input-bg: #060914;
            --border-color: rgba(0, 255, 240, 0.15);
        }

        * {
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #070b1a 0%, #0d1530 100%);
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 760px;
            background: var(--container-bg);
            padding: 30px 25px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 
                        0 0 30px rgba(0, 255, 240, 0.03);
            opacity: 0;
            transform: translateY(20px);
            will-change: transform, opacity; /* Optimalisasi performa HP */
        }

        .header-zone {
            text-align: center;
            margin-bottom: 30px;
        }

        h2 {
            font-size: 26px;
            font-weight: 800;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, #ffffff 40%, var(--sea-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p.subtitle {
            color: var(--text-muted);
            margin: 0;
            font-size: 14px;
        }

        /* Form Grid yang Ringan */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 12px;
            font-weight: 700;
            color: var(--sea-blue);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], input[type="date"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            background: var(--input-bg);
            color: #fff;
            font-size: 14px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input[type="text"]:focus, input[type="date"]:focus {
            outline: none;
            border-color: var(--sea-blue);
            box-shadow: 0 0 10px rgba(0, 255, 240, 0.15);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1) hue-rotate(135deg);
            cursor: pointer;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.1s ease, filter 0.2s ease;
        }

        .btn-generate { 
            background: linear-gradient(135deg, var(--sea-blue), var(--neon-purple)); 
            color: #070b19;
            box-shadow: 0 4px 15px rgba(0, 255, 240, 0.15);
        }
        
        .btn-generate:hover:not(:disabled) {
            filter: brightness(1.1);
        }

        .btn-generate:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled { 
            background: #1e293b !important; 
            cursor: not-allowed; 
            color: var(--text-muted) !important;
            box-shadow: none !important;
        }

        /* Loading Area */
        .loading-wrapper {
            display: none;
            text-align: center;
            margin: 25px 0;
            padding: 15px;
            background: rgba(255, 188, 0, 0.02);
            border-radius: 12px;
            border: 1px dashed rgba(255, 188, 0, 0.15);
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(0, 255, 240, 0.1);
            border-top: 3px solid var(--sea-blue);
            border-radius: 50%;
            margin: 0 auto 12px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #ffbc00;
            font-weight: 600;
            font-size: 14px;
        }

        /* Output Area */
        .output-container {
            margin-top: 30px;
            display: none;
            opacity: 0;
            transform: translateY(15px);
            will-change: transform, opacity;
        }

        #output {
            background: #04060d;
            border: 1px solid rgba(255,255,255,0.03);
            border-left: 3px solid var(--sea-blue);
            padding: 20px;
            white-space: pre-wrap;
            border-radius: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.6;
            color: #e2e8f0;
            max-height: 350px;
            overflow-y: auto;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-copy { background: rgba(46, 204, 113, 0.1); color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.2); }
        .btn-download { background: rgba(52, 152, 219, 0.1); color: #3498db; border: 1px solid rgba(52, 152, 219, 0.2); }
        
        .btn-copy:hover { background: #2ecc71; color: #fff; }
        .btn-download:hover { background: #3498db; color: #fff; }

        .pastebin-box {
            display: none;
            opacity: 0;
            margin-top: 15px;
            text-align: center;
            background: rgba(0, 255, 240, 0.02);
            padding: 12px;
            border-radius: 10px;
            border: 1px dashed rgba(0, 255, 240, 0.15);
            font-size: 13px;
        }

        .pastebin-box a {
            color: var(--sea-blue);
            font-weight: 700;
            text-decoration: none;
        }

        /* Toast Notifications (Ringan & Cepat) */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            min-width: 280px;
            padding: 14px 20px;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(120%);
            will-change: transform;
        }

        .toast.success { background: #2ecc71; }
        .toast.error { background: #e74c3c; }
        .toast.info { background: #1f293d; border: 1px solid var(--sea-blue); }

        /* Responsive Mobile Layout */
        @media (max-width: 600px) {
            .container { padding: 20px 15px; }
            .form-grid { grid-template-columns: 1fr; gap: 12px; }
            h2 { font-size: 20px; }
            .btn-group { flex-direction: column; gap: 8px; }
            .toast-container { right: 10px; left: 10px; top: 10px; }
            .toast { min-width: auto; }
        }
    </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="container" id="mainContainer">
    <div class="header-zone">
        <h2>Character Story Generator</h2>
        <p class="subtitle">Buat alur cerita forum JGRP / SAMP instan & ringan</p>
    </div>

    <div class="form-grid">
        <div class="form-group">
            <label for="charName">Nama Karakter</label>
            <input type="text" id="charName" placeholder="Contoh: Carl_Johnson" required>
        </div>
        
        <div class="form-group">
            <label for="birthPlace">Tempat Lahir</label>
            <input type="text" id="birthPlace" placeholder="Contoh: Brooklyn, USA" required>
        </div>
        
        <div class="form-group">
            <label for="birthDate">Tanggal Lahir</label>
            <input type="date" id="birthDate" required>
        </div>

        <div class="form-group">
            <label for="promptTambahan">Detail Tambahan (Opsional)</label>
            <input type="text" id="promptTambahan" placeholder="Contoh: Mekanik montir, miskin">
        </div>
    </div>
    
    <button class="btn btn-generate" id="btnGen" onclick="generateStoryWithAnim()">
        <span>Generate Character Story ✨</span>
    </button>
    
    <div class="loading-wrapper" id="loadingArea">
        <div class="spinner"></div>
        <div class="loading-text">MENGHUBUNGKAN KE AI ENGINE...</div>
    </div>

    <div class="output-container" id="outputContainer">
        <label style="font-size: 12px; font-weight: 700; color: var(--sea-blue); display:block; margin-bottom:8px;">FORMAT FORUM JGRP:</label>
        <div id="output"></div>
        
        <div class="btn-group">
            <button class="btn btn-copy" onclick="copyText()">📋 Copy Text</button>
            <button class="btn btn-download" onclick="downloadTxt()">💾 Download .TXT</button>
        </div>

        <div class="pastebin-box" id="pastebinBox">
            Teks disalin! Silakan tempel ke <a href="https://pastebin.com" target="_blank">Pastebin Resmi</a>
        </div>
    </div>
</div>

<script>
    // Fade in pakai durasi pas & optimalisasi transisi linear/quad
    window.addEventListener('DOMContentLoaded', () => {
        gsap.to("#mainContainer", { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" });
    });

    function showNotification(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        
        let icon = '🔔';
        if (type === 'success') icon = '⚡';
        if (type === 'error') icon = '⚠️';
        if (type === 'info') icon = '🛰️';

        toast.innerHTML = `<div>${icon}</div> <div>${message}</div>`;
        container.appendChild(toast);

        // Animasi transisi murni tanpa bounce berat agar mulus di HP
        gsap.to(toast, { translateX: '0%', duration: 0.4, ease: "power2.out" });

        setTimeout(() => {
            gsap.to(toast, { opacity: 0, x: 30, duration: 0.3, ease: "power2.in", onComplete: () => {
                toast.remove();
            }});
        }, 4000);
    }

    async function generateStoryWithAnim() {
        const fullName = document.getElementById('charName').value.trim();
        const place = document.getElementById('birthPlace').value.trim();
        const dateInput = document.getElementById('birthDate').value;
        const infoTambahan = document.getElementById('promptTambahan').value.trim();

        if(!fullName || !place || !dateInput) {
            showNotification("Isi semua kolom wajib!", "error");
            return;
        }

        const dateObj = new Date(dateInput);
        const day = String(dateObj.getDate()).padStart(2, '0');
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const year = dateObj.getFullYear();
        const formatCSDate = `${day}/${month}/${year}`;

        const btn = document.getElementById('btnGen');
        const loadingArea = document.getElementById('loadingArea');
        const outputContainer = document.getElementById('outputContainer');
        const pastebinBox = document.getElementById('pastebinBox');

        pastebinBox.style.display = 'none';
        btn.disabled = true;
        
        showNotification("Mengirim perintah ke AI...", "info");

        if(outputContainer.style.display === 'block') {
            gsap.to(outputContainer, { opacity: 0, y: 10, duration: 0.2, onComplete: () => {
                outputContainer.style.display = 'none';
                startLoading();
            }});
        } else {
            startLoading();
        }

        function startLoading() {
            loadingArea.style.display = 'block';
            gsap.fromTo(loadingArea, { opacity: 0 }, { opacity: 1, duration: 0.2 });
        }

        const promptAI = `Kamu adalah penulis cerita profesional untuk forum GTA SAMP Roleplay (seperti JGRP).
        Tugasmu adalah membuat Character Story yang realistis, logis, dan mengalir natural seperti novel.
        ATURAN KETAT:
        1. JANGAN gunakan elemen fiksi ilmiah, fantasi, sihir, superpower, atau game lain. Cerita harus 100% kehidupan nyata manusia biasa.
        2. Cerita WAJIB terdiri dari MINIMAL 3 PARAGRAF PANJANG (Total minimal 300-400 kata).
        3. Berikan 5 spasi di awal setiap paragraf agar menjorok ke dalam (indentasi).
        4. Tulis HANYA ceritanya saja, tanpa kata pengantar, tanpa judul tambahan, dan tanpa tanda petik di awal/akhir cerita.
        STRUKTUR ALUR CERITA:
        - Paragraf 1 (Masa Kecil): Ceritakan kehidupan awal ${fullName.replace('_', ' ')} saat lahir di ${place} pada tanggal ${day}/${month}/${year}. Bagaimana lingkungan keluarganya dan sifat masa kecilnya.
        - Paragraf 2 (Titik Balik): Mengapa dia memutuskan pergi dari ${place}? Berikan alasan realistis (masalah ekonomi, ingin mandiri, mencari tantangan, atau kabur dari masa lalu) yang membuatnya nekat merantau ke kota Los Santos.
        - Paragraf 3 (Kehidupan di Los Santos): Ceritakan bagaimana kerasnya awal kehidupan dia saat menginjakkan kaki di Los Santos. Sebutkan nama daerah di Los Santos (seperti Ganton, Idlewood, Market, Commerce, atau Willowfield). Sebutkan juga pekerjaannya sekarang (misal: sopir taksi, mekanik, tukang bersih jalan, atau kurir) demi bertahan hidup.
        Detail Alur Tambahan dari User (Opsional): ${infoTambahan ? infoTambahan : 'Tidak ada'}.`;

        try {
            const response = await fetch("https://text.pollinations.ai/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "Kamu adalah asisten penulis Character Story GTA SAMP yang realistis." },
                        { role: "user", content: promptAI }
                    ],
                    model: "openai"
                })
            });

            if (!response.ok) throw new Error("Server sibuk.");
            
            let aiStory = await response.text();
            aiStory = aiStory.replace(/^["'`]|["'`]$/g, '').trim();

            const finalOutput = `Character: ${fullName}\nOrigin: ${place}\nStory Character Born: ${formatCSDate}\n\n--- Character Story ---\n\n${aiStory}`;

            document.getElementById('output').innerText = finalOutput;
            
            gsap.to(loadingArea, { opacity: 0, duration: 0.2, onComplete: () => {
                loadingArea.style.display = 'none';
                outputContainer.style.display = 'block';
                gsap.fromTo(outputContainer, { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.3 });
                outputContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                showNotification("Character Story berhasil dimuat!", "success");
            }});

        } catch (error) {
            showNotification("Error: " + error.message, "error");
            loadingArea.style.display = 'none';
        } finally {
            btn.disabled = false;
        }
    }

    function copyText() {
        const textToCopy = document.getElementById('output').innerText;
        const pastebinBox = document.getElementById('pastebinBox');
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            pastebinBox.style.display = 'block';
            gsap.fromTo(pastebinBox, { opacity: 0 }, { opacity: 1, duration: 0.2 });
            showNotification("Teks berhasil disalin!", "success");
        }).catch(() => {
            showNotification("Gagal menyalin teks.", "error");
        });
    }

    function downloadTxt() {
        const textToCopy = document.getElementById('output').innerText;
        const name = document.getElementById('charName').value.trim() || "story";
        const blob = new Blob([textToCopy], { type: "text/plain;charset=utf-8" });
        const link = document.createElement("a");
        
        link.href = URL.createObjectURL(blob);
        link.download = `${name}_CS.txt`;
        link.click();
        URL.revokeObjectURL(link.href);
        showNotification("File .txt diunduh!", "success");
    }
</script>

</body>
    </html>
